<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparaison des propositions citoyennes</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#f6f8fc;
margin:0;
padding:40px;
color:#1f2937;
}

h1{
margin-bottom:10px;
}

.legend{
margin:15px 0 25px 0;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.badge{
padding:6px 12px;
border-radius:20px;
font-weight:600;
font-size:14px;
}

.status0{background:#f3f4f6;color:#374151}
.status1{background:#fef9c3;color:#92400e}
.status2{background:#dcfce7;color:#166534}

.theme{
background:white;
border-radius:14px;
padding:18px;
margin-bottom:22px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #e5e7eb;
vertical-align:top;
}

th{
font-size:14px;
text-align:left;
color:#6b7280;
}

.proposition{
font-weight:500;
width:55%;
}

.status-cell{
text-align:center;
font-size:20px;
cursor:default;
position:relative;
}

.tooltip{
position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
background:#111827;
color:white;
padding:12px;
border-radius:10px;
width:420px;
max-height:260px;
overflow:auto;
font-size:14px;
line-height:1.4;
display:none;
z-index:100;
}

.status-cell:hover .tooltip{
display:block;
}

.search{
margin-bottom:20px;
}

.search input{
padding:10px 14px;
border-radius:8px;
border:1px solid #d1d5db;
width:320px;
font-size:14px;
}

</style>
</head>

<body>

<h1>Comparaison des propositions citoyennes-a</h1>

<div class="legend">
<span class="badge status2">✓ reprise entièrement</span>
<span class="badge status1">≈ reprise partiellement</span>
<span class="badge status0">— absente</span>
</div>

<div class="search">
<input id="search" placeholder="Rechercher une proposition ou un thème…">
</div>

<div id="content">Chargement…</div>

<script>

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT7RqkUsJ927QoYtFZXGaHAZhqzSFYd6fITaYgnc_pVv97x58arnVUJuH21amSDaCkr2CrNEgqgqn6w/pub?output=csv";

const STATUS = {
0:{symbol:"—",class:"status0"},
1:{symbol:"≈",class:"status1"},
2:{symbol:"✓",class:"status2"}
};

let rows=[];

function escapeHTML(str){
return String(str||"")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

function formatText(text){
return escapeHTML(text).replace(/\n/g,"<br>");
}

function badge(value,details){

let s=STATUS[value]||STATUS[0];

if(value==1||value==2){

return `
<div class="status-cell">
<span class="${s.class}">${s.symbol}</span>
<div class="tooltip">${formatText(details)}</div>
</div>
`;

}

return `<div class="status-cell"><span class="${s.class}">${s.symbol}</span></div>`;

}

function groupByTheme(data){

let map={};

data.forEach(r=>{
if(!map[r.theme]) map[r.theme]=[];
map[r.theme].push(r);
});

return map;

}

function render(data){

let grouped=groupByTheme(data);

let html="";

for(let theme in grouped){

html+=`<div class="theme">
<h2>${escapeHTML(theme)}</h2>

<table>

<thead>
<tr>
<th>Proposition citoyenne</th>
<th>Benoît Tirmarche</th>
<th>Stéphanie Ducret</th>
</tr>
</thead>

<tbody>
`;

grouped[theme].forEach(p=>{

html+=`
<tr>

<td class="proposition">${escapeHTML(p.proposition)}</td>

<td>
${badge(p.benoit,p.benoitProgramme)}
</td>

<td>
${badge(p.stephanie,p.stephanieProgramme)}
</td>

</tr>
`;

});

html+=`
</tbody>
</table>
</div>
`;

}

document.getElementById("content").innerHTML=html;

}

Papa.parse(csvURL,{
download:true,
header:true,
skipEmptyLines:true,
complete:function(results){

rows=results.data.map(r=>({

theme:r["Thème"]||"Autre",

proposition:r["Proposition citoyenne"],

benoit:Number(r["Benoît Tirmarche"]||r["Benoit Tirmarche"]||0),

stephanie:Number(r["Stéphanie Ducret"]||r["Stephanie Ducret"]||0),

benoitProgramme:r[Object.keys(r)[4]]||"",
stephanieProgramme:r[Object.keys(r)[5]]||""

}));

render(rows);

}
});

document.getElementById("search").addEventListener("input",function(){

let q=this.value.toLowerCase();

let filtered=rows.filter(r=>
r.theme.toLowerCase().includes(q) ||
r.proposition.toLowerCase().includes(q)
);

render(filtered);

});

</script>

</body>
</html>
